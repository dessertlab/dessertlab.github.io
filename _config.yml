title: DESSERT Research Group
name: DESSERT Research Group
url: https://dessertlab.github.io
baseurl: ""

exclude: [bibble, README.md, Makefile, Dockerfile]

# colorize code snippets with the pygments module
highlighter: pygments

# The path structure for blog posts.
permalink: /blog/:year/:month/:day/:title.html

# Sections on the "people" page.
roles:
  - key: faculty
    name: Faculty
  - key: postdoc
    name: Postdoctoral Researchers and Research Fellows
  - key: phd_student
    name: PhD Students
  - key: visiting_researchers
    name: Visiting Researchers
  - key: former_researchers
    name: Former Researchers

# Number of news stories on the front page.
front_page_news: 8

# Base pathname for links.
base: ''

# make pages for the _projects and the _topics folders
collections:
  projects_current:
    output: true
  projects_past:
    output: true
  topics_realtime:
    output: true
  topics_reliability:
    output: true
  topics_security:
    output: true
  teaching:
    output: true

# Navigation bar links.
navigation:
  - title: Home
    link: /
  - title: People
    link: /#people
  - title: Research
    link: /research.html
  - title: Projects
    link: /projects.html
  - title: Publications
    link: /publications.html
  - title: PhD Thesis
    link: /thesis_PhD_completed.html
  - title: Tools & Code
    link: /repositories.html
  - title: Teaching
    link: /teaching.html
 
